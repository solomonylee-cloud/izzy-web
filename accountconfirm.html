<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm your Izzy account</title>
<link rel="stylesheet" href="styles.css">
<style>.confirm-wrap{max-width:460px;margin:12vh auto;padding:24px;text-align:center}
.confirm-wrap h1{margin:.4em 0}.confirm-btn{display:inline-block;margin-top:20px;padding:14px 28px;border-radius:999px;background:#1B426B;color:#fff;text-decoration:none;font-weight:700}
.muted{opacity:.7;font-size:14px}</style>
</head><body>
<div class="confirm-wrap" id="wrap">
  <h1 id="title">Confirming…</h1>
  <p id="msg" class="muted">One moment while we confirm your account.</p>
  <a id="openApp" class="confirm-btn" style="display:none" href="#">Open Izzy</a>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const PROJECTS = {
  prod:    { url: 'https://jfafstzpurlgpyrfoheg.supabase.co', anon: 'sb_publishable_eTyWJE4lS_74Ek7JDtwvIA_rQ7dj9mU' },
  staging: { url: 'https://kncotpbwcaqtqgnksiue.supabase.co', anon: 'sb_publishable_w4d48K0MtUuvOyULYmCLJA_gl9_j25U' },
};
const p = new URLSearchParams(location.search);
const token_hash = p.get('token_hash');
const type = p.get('type') || 'signup';
const project = PROJECTS[p.get('project')] ? p.get('project') : 'prod';
const title = document.getElementById('title'), msg = document.getElementById('msg'), openApp = document.getElementById('openApp');
(async () => {
  if (!token_hash) { title.textContent = 'Link incomplete'; msg.textContent = 'This confirmation link is missing its token. Request a new email from the app.'; return; }
  try {
    const { url, anon } = PROJECTS[project];
    const supabase = createClient(url, anon);
    const { error } = await supabase.auth.verifyOtp({ type, token_hash });
    if (error) throw error;
    title.textContent = '✅ Email confirmed!';
    msg.textContent = 'Your Izzy account is verified. Open the app to log in.';
  } catch (e) {
    title.textContent = 'Link expired';
    msg.textContent = 'This confirmation link has already been used or expired. Open Izzy and request a new one.';
  }
  openApp.style.display = 'inline-block';
  openApp.href = 'https://apps.apple.com/app/id6761801986';
})();
</script>
</body></html>
